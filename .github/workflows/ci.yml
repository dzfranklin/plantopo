name: CI
on:
  push:
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci

      - run: npm run download-fonts

      - name: Typecheck
        run: |
          npx tsc --noEmit -p packages/shared/tsconfig.json
          npx tsc --noEmit -p packages/api/tsconfig.json
          npx tsc --noEmit -p packages/web/tsconfig.json

      - name: Lint
        run: |
          npx eslint .
          npx prettier --check .

      - name: Install Playwright Chromium
        run: npx -w @pt/web playwright install chromium --with-deps

      - name: Run tests
        run: npm test -- --run --silent=false

      - name: Upload test failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failures-${{ github.run_id }}
          path: |
            packages/**/.vitest-attachments/**
            packages/**/__snapshots__/**
          if-no-files-found: warn

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_HASH=${{ github.sha }}
